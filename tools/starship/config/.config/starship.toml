"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
command_timeout = 1000
scan_timeout = 20
follow_symlinks = false
palette = "catppuccin_mocha"

format = """
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$package\
$nodejs\
$bun\
$python\
$rust\
$golang\
$java\
$lua\
$solidity\
$line_break\
$character"""

right_format = """
$custom\
$docker_context\
$aws\
$gcloud\
$cmd_duration\
$status\
$jobs\
$time"""

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[directory]
style = "bold sapphire"
repo_root_style = "bold blue"
read_only = " َ°Œ¾"
truncation_length = 4
truncate_to_repo = true

[git_branch]
style = "bold mauve"
symbol = "î‚  "

[git_commit]
style = "bold green"
only_detached = true
tag_disabled = false
tag_symbol = " ïگ’ "

[git_state]
style = "bold yellow"

[git_status]
style = "bold red"
ahead = "â‡،${count}"
behind = "â‡£${count}"
diverged = "â‡•â‡،${ahead_count}â‡£${behind_count}"
stashed = "î¶•${count} "
staged = "[++\\($count\\)](green)"
ignore_submodules = true

[package]
style = "bold peach"
symbol = "َ°ڈ— "
display_private = true

[nodejs]
style = "bold green"
symbol = "îœک "
detect_files = ["package.json", ".node-version", ".nvmrc", "!bunfig.toml", "!bun.lock", "!bun.lockb"]

[bun]
style = "bold peach"
symbol = "î‌¯ "

[python]
style = "bold yellow"
symbol = "îˆµ "
pyenv_version_name = true

[rust]
style = "bold red"
symbol = "î‍¨ "

[golang]
style = "bold sky"
symbol = "îک§ "

[java]
style = "bold red"
symbol = "î‰– "

[lua]
style = "bold blue"
symbol = "îک  "

[solidity]
style = "bold lavender"
symbol = "َ°،ھ "

[docker_context]
style = "bold blue"
symbol = "ïŒˆ "
only_with_files = true

[aws]
style = "bold yellow"
symbol = "َ°¸ڈ "
format = "on [$symbol($profile)(@$region)( \\[$duration\\])]($style) "

[gcloud]
style = "bold sapphire"
symbol = "َ±‡¶ "
detect_env_vars = ["CLOUDSDK_ACTIVE_CONFIG_NAME"]
format = "on [$symbol$account(@$domain)(\\($region\\))]($style) "

[cmd_duration]
style = "bold yellow"
min_time = 1000
format = "took [$duration]($style) "

[status]
disabled = false
style = "bold red"
symbol = "âœک "
format = "[$symbol$status]($style) "

[jobs]
style = "bold blue"
symbol = "âœ¦"
number_threshold = 2

[time]
disabled = false
style = "bold overlay1"
format = "at [$time]($style) "
time_format = "%H:%M"

[character]
success_symbol = "[â‌¯](bold green)"
error_symbol = "[â‌¯](bold red)"
vimcmd_symbol = "[ï’‡](bold yellow)"

[custom.opencode]
command = "printf ''"
description = "Detect OpenCode project config"
detect_files = ["opencode.json", "opencode.jsonc"]
detect_folders = [".opencode"]
format = "[$symbol]($style) "
style = "bold mauve"
symbol = "oc"

[custom.foundry]
command = "printf ''"
description = "Detect Foundry projects"
detect_files = ["foundry.toml"]
format = "[$symbol]($style) "
style = "bold lavender"
symbol = "forge"
