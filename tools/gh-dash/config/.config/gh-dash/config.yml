prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me

issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me

notificationsSections:
  - title: Review Requested
    filters: reason:review-requested
  - title: Mentioned
    filters: reason:mention
  - title: Participating
    filters: reason:participating
  - title: All
    filters: ""

repoPaths:
  LuisUrrutia/.dotfiles: ~/.dotfiles
  LuisUrrutia/*: ~/LuisUrrutia/*
  "*/*": ~/Projects/*

defaults:
  preview:
    open: false
    width: 70
  prsLimit: 30
  issuesLimit: 30
  notificationsLimit: 30
  view: prs
  refetchIntervalMinutes: 15
  layout:
    prs:
      updatedAt:
        width: 6
      repo:
        width: 24
      author:
        width: 14
      assignees:
        hidden: true
      base:
        hidden: true
    issues:
      updatedAt:
        width: 6
      repo:
        width: 24
      creator:
        width: 14
      assignees:
        hidden: true

keybindings:
  prs:
    - key: C
      name: opencode review
      command: >
        tmux new-window -c '{{.RepoPath}}' -n "PR-{{.PrNumber}}"
        'wt switch pr:{{.PrNumber}} -x "opencode --prompt \"@code-reviewer: review this pull request branch\""'
    - key: W
      name: walkthrough
      command: >
        tmux new-window -c '{{.RepoPath}}' -n "walkthrough-{{.PrNumber}}"
        'wt switch pr:{{.PrNumber}} -x "opencode --prompt /walkthrough"'

theme:
  colors:
    text:
      primary: "#cdd6f4"
      secondary: "#89dceb"
      inverted: "#11111b"
      faint: "#6c7086"
      warning: "#f9e2af"
      success: "#a6e3a1"
    background:
      selected: "#313244"
    border:
      primary: "#89b4fa"
      secondary: "#a6e3a1"
      faint: "#45475a"
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: true

pager:
  diff: delta

confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
