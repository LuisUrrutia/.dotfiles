# Prefix
unbind-key C-b
set -g prefix `
bind-key ` send-prefix
set -g prefix2 ^A
bind-key ^A send-keys ^A

# Terminal integration
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-ghostty:RGB,clipboard,focus,extkeys,hyperlinks,osc7,sync,title'
set -as terminal-features ',ghostty*:RGB,clipboard,focus,extkeys,hyperlinks,osc7,sync,title'
set -as terminal-features ',xterm-256color:RGB,clipboard,focus,extkeys,title'
set -g extended-keys on
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on

# Behavior
set -g display-time 4000
set -g base-index 1
set -g pane-base-index 1
set -g history-limit 1000000
set -g renumber-windows on
set -g status-position top
set -g status-interval 5
set -g escape-time 10
set -g mouse on
set -g detach-on-destroy no-detached

# Keybindings
bind-key r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind-key c new-window -c "#{pane_current_path}"
unbind-key '"'
unbind-key %
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Visuals
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
set -g pane-border-lines single
set -g pane-border-indicators both
set -g pane-scrollbars modal
set -g pane-scrollbars-position right
set -g pane-scrollbars-style 'fg=magenta,bg=brightblack,width=1,pad=0'
set -g status-style bg=default
set -g mode-style 'fg=black,bg=magenta,bold'
set -g copy-mode-match-style 'fg=black,bg=yellow'
set -g copy-mode-current-match-style 'fg=black,bg=green,bold'
set -g copy-mode-selection-style 'fg=black,bg=blue'
set -g copy-mode-position-style 'fg=black,bg=magenta'
set -g popup-border-lines rounded
set -g popup-border-style 'fg=magenta'
set -g popup-style 'bg=default'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect / tmux-continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-fzf
set-environment -g TMUX_FZF_OPTIONS '-p -w 80% -h 80% -m'
set-environment -g TMUX_FZF_MENU_POPUP '1'
set-environment -g TMUX_FZF_MENU_POPUP_WIDTH '80%'
set-environment -g TMUX_FZF_MENU_POPUP_HEIGHT '80%'

# Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_status_style 'custom'
set -g @catppuccin_window_left_separator ''
set -g @catppuccin_window_right_separator ' '
set -g @catppuccin_window_middle_separator ' █'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_text '#W'
set -g @catppuccin_window_current_text '#W#{?window_zoomed_flag,(),}'
set -g @catppuccin_window_default_fill 'number'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_status_left_separator ' '
set -g @catppuccin_status_right_separator ' '
set -g @catppuccin_status_right_separator_inverse 'no'
set -g @catppuccin_status_fill 'icon'
set -g @catppuccin_status_connect_separator 'no'
set -g @catppuccin_directory_text '#{b:pane_current_path}'
set -g @catppuccin_date_time_text '%H:%M'
set -g status-left-length 100
set -g status-right-length 100
set -g status-left '#{E:@catppuccin_status_session}'
set -g status-right '#{E:@catppuccin_status_directory}'
set -ag status-right '#{E:@catppuccin_status_date_time}'

if-shell 'test -x "$HOME/.tmux/plugins/tpm/tpm"' {
  run "$HOME/.tmux/plugins/tpm/tpm"
} {
  display-message 'TPM is not installed; run tools/tmux/install.sh and prefix + I to install plugins'
}
