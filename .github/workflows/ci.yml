name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke test dotfiles
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install validation tools
        run: brew install actionlint fish gitleaks lua shellcheck stow

      - name: Lint workflows
        run: actionlint .github/workflows/ci.yml

      - name: Audit action pins
        run: tools/bin/config/.local/bin/gha-pins audit .github/workflows

      - name: Check shell scripts
        run: |
          set -euo pipefail

          scripts=()
          for script in install.sh private-install.sh cleanup.sh machines/*.sh .githooks/* brewfiles/*.sh tools/lib.sh tools/*/install.sh tools/*/common.sh tools/*/migrate-config.sh tools/*/config/.local/bin/* tools/macos/prefs-diff.sh; do
            [[ -f "$script" ]] && scripts+=("$script")
          done

          for script in "${scripts[@]}"; do
            bash -n "$script"
          done

          shellcheck "${scripts[@]}"

          bash tools/bin/tests/thaw-config.sh
          bash tools/bin/tests/install-ssh-key-from-1password.sh
          bash tools/git/tests/migrate-config.sh
          bash tools/skills/tests/install.sh

      - name: Smoke test installer plan
        run: |
          set -euo pipefail

          # /bin/bash pins macOS's bash 3.2, the only bash on a fresh Mac
          # before Homebrew exists — the environment install.sh must support.
          /bin/bash install.sh --dry-run
          /bin/bash install.sh --dry-run --core-only
          /bin/bash install.sh --dry-run --all-profiles
          /bin/bash install.sh --dry-run --profile web3,streaming,audio
          /bin/bash install.sh --dry-run --profile blockchain,obs,focusrite
          DOTFILES_HARDWARE_HASH_OVERRIDE=55930b1d4d8e /bin/bash install.sh --dry-run

      - name: Check Hammerspoon tests
        run: bash tools/hammerspoon/tests/run.sh

      - name: Check Fish scripts
        run: |
          set -euo pipefail

          while IFS= read -r -d '' script; do
            fish --no-execute "$script"
          done < <(find tools/fish -type f -name '*.fish' -print0)

      - name: Scan for secrets
        run: gitleaks detect --source . --no-git --redact --no-banner

      - name: Check Brewfiles
        run: |
          set -euo pipefail

          bash brewfiles/check.sh

      - name: Check Homebrew vulnerabilities
        run: |
          set -euo pipefail

          brew install homebrew/brew-vulns/brew-vulns
          # --warn-only: upstream OSV findings in third-party deps are not
          # actionable from this repo and should not hold main hostage; scan
          # errors (exit 2) still fail the job.
          bash brewfiles/vulns.sh --warn-only

      - name: Check Stow packages
        run: |
          set -euo pipefail

          tmp_home="$(mktemp -d)"
          trap 'rm -rf "$tmp_home"' EXIT

          for tool_dir in tools/*; do
            [[ -d "$tool_dir/config" ]] || continue
            stow --no-folding --restow -d "$tool_dir" -t "$tmp_home" config
          done
